messages:
  prefix: "<gray>[<aqua><bold>HomieCraft <light_purple>SMP<gray>] "

  plugin_enable: "<green>HomieCraft Plugin wurde gestartet!"
  plugin_disable: "<red>HomieCraft Plugin wurde gestoppt!"
  
  help: "<aqua>HomieCraft Commands: <gray>/spawn, /setspawn, /tpa ..."
  reload: "<green>Plugin wurde neu geladen!"
  no_permission: "<red>Du bist nicht dazu berechtigt."
  unknown_command: "<red>Diesen Befehl gibt es nicht! Mache <dark_red>/help</dark_red> für Hilfe."

  join: "<red><italic>%player% </i><gray>hat den Server betreten!"
