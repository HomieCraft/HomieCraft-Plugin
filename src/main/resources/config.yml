  leave: "<red><italic>%player% </i><gray>hat den Server verlassen!"

  diamonds_found: "<red>Du hast <aqua>%amount% Diamanten <red>gefunden!"
  
  spawn_set: "<green>Spawn wurde gesetzt!"
