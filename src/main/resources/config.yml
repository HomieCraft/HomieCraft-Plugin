  tpa_offline: "<red>Spieler ist offline."
  tpahere_sent: "<gray>Anfrage gesendet an <red>%target%</red> (zu dir)"
  tpa_auto_on: "<green>Auto-TPA aktiviert"
  tpa_auto_off: "<red>Auto-TPA deaktiviert"
  tpa_toggle_on: "<green>TPA aktiviert"
  tpa_toggle_off: "<red>TPA deaktiviert"
  tpa_blocked: "<red>Dieser Spieler blockiert TPA-Anfragen."
  tpa_received: "<gray>----------\n<red>%player%</red> möchte sich zu dir teleportieren\n\n<green><click:run_command:'/tpaccept'><hover:show_text:'<gray>Klicke zum Annehmen'>[Annehmen]</hover></click> <red><click:run_command:'/tpdeny'><hover:show_text:'<gray>Klicke zum Ablehnen'>[Ablehnen]</hover></click>\n<gray>----------"
  tpahere_received: "<gray>----------\n<red>%player%</red> möchte dass du zu ihm kommst\n\n<green><click:run_command:'/tpaccept'><hover:show_text:'<gray>Klicke zum Annehmen'>[Annehmen]</hover></click> <red><click:run_command:'/tpdeny'><hover:show_text:'<gray>Klicke zum Ablehnen'>[Ablehnen]</hover></click>\n<gray>----------"

