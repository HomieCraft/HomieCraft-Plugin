  tpa_deny: "<red>Anfrage abgelehnt."
  tpa_denied: "<red>Deine Anfrage wurde abgelehnt."
  tpa_expired: "<red>Anfrage abgelaufen."
  tpa_none: "<red>Keine Anfrage vorhanden."
  tpa_cancel_move: "<red>Teleport abgebrochen, du hast dich bewegt."
  tpa_teleport: "<green>Teleportiert!"
